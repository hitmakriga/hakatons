<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telefona Apstiprināšana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; }
        .info {
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
        }
        button {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            width: 100%;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Telefona Apstiprināšana</h1>
        
        <div id="saturs">
            <p>✅ QR kods veiksmīgi noskenēts!</p>
            
            <div class="info" id="info">
                Ielādē...
            </div>
            
            <button onclick="apstiprinat()">
                ✅ APSTIPRINĀT
            </button>
            
            <p style="color: #666;">Nospied pogu, lai pabeigtu autorizāciju</p>
        </div>
        
        <div id="paldies" style="display: none;">
            <h2 style="color: #43e97b;">✓ Paldies!</h2>
            <p>Datora lapai vajadzētu mainīties.</p>
            <p>Vari aizvērt šo lapu.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sesija = urlParams.get('sesija');
        
        if (sesija) {
            document.getElementById('info').innerHTML = `
                <strong>Sesijas ID:</strong><br>
                ${sesija}
            `;
        } else {
            document.getElementById('saturs').innerHTML = `
                <div class="error">
                    <strong>❌ Kļūda: Nav sesijas ID!</strong><br><br>
                    Šo lapu jāatver no QR koda ar parametru ?sesija=...
                </div>
            `;
        }
        
        function apstiprinat() {
            if (!sesija) return;
            
            // PĀRVIETOJAMIES UZ DATORA LAPU AR APSTIPRINĀJUMA PARAMETRU
            const datoraLapa = 'https://hitmakriga.github.io/hakatons/qr';
            window.location.href = datoraLapa + '?apstiprinats=' + sesija;
            
            // Parādām paldies ziņu
            document.getElementById('saturs').style.display = 'none';
            document.getElementById('paldies').style.display = 'block';
        }
    </script>
</body>
</html>
