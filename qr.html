<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apstiprināšana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        
        button {
            background-color: #43e97b;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 20px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background-color: #38f9d7;
            transform: scale(1.05);
        }
        
        .info {
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Apstiprināšana</h1>
        
        <div id="saturs">
            <p>Vai vēlies apstiprināt autorizāciju?</p>
            
            <button onclick="apstiprinat()">✅ APSTIPRINĀT</button>
            
            <div class="info" id="info">
                ...
            </div>
        </div>
        
        <div id="paldies" style="display: none;">
            <h2>🙏 Paldies!</h2>
            <p>Autorizācija apstiprināta.</p>
            <p>Tagad vari aizvērt šo lapu.</p>
        </div>
    </div>

    <script>
        function apstiprinat() {
            // Iegūst sesijas ID no URL
            const urlParams = new URLSearchParams(window.location.search);
            const sesija = urlParams.get('sesija');
            
            if (sesija) {
                // Saglabā localStorage, ka šī sesija ir apstiprināta
                // localStorage kopīgojas starp visām viena domēna lapām!
                localStorage.setItem('apstiprinats_' + sesija, 'true');
                
                // Parāda paldies ziņu
                document.getElementById('saturs').style.display = 'none';
                document.getElementById('paldies').style.display = 'block';
                
                // Pēc 3 sekundēm var aizvērt lapu
                setTimeout(function() {
                    window.close();
                }, 3000);
            } else {
                document.getElementById('info').innerText = 'Kļūda: nav sesijas ID!';
            }
        }
        
        // Parāda sesijas ID
        const urlParams = new URLSearchParams(window.location.search);
        const sesija = urlParams.get('sesija');
        if (sesija) {
            document.getElementById('info').innerText = 'Sesija: ' + sesija;
        }
    </script>
</body>
</html>
