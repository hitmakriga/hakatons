<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Autorizācija - Dators</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            background-color: #2d2d44;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #fff; margin-bottom: 30px; }
        #qrSekcija { transition: opacity 0.5s ease; }
        .qr-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            display: inline-block;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        #qrKods { max-width: 300px; width: 100%; height: auto; }
        #zina {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            padding: 50px;
            border-radius: 15px;
            color: white;
            font-size: 36px;
            font-weight: bold;
            margin: 20px 0;
            display: none;
            animation: paradi 0.5s ease;
        }
        @keyframes paradi {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        .status {
            background-color: #1e1e2f;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 18px;
            border-left: 4px solid #667eea;
        }
        .id-info {
            background-color: #3d3d5c;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            margin: 10px 0;
            word-break: break-all;
        }
        .palidziba {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
            padding: 10px;
            background-color: #1e1e2f;
            border-radius: 5px;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💻 Datora QR Autorizācija</h1>
        
        <div id="qrSekcija">
            <div class="status" id="status">
                <span class="loader"></span>
                Gaida, kad telefons noskenēs QR kodu...
            </div>
            
            <div class="qr-container">
                <img id="qrKods" src="" alt="Ielādē QR kodu...">
            </div>
            
            <div class="id-info" id="sesijasId">
                Sesijas ID: ...
            </div>
            
            <p style="color: #aaa;">1. Atver kameru telefonā<br>2. Noskenē šo QR kodu<br>3. Pagaidi, kamēr dators atjaunojas</p>
        </div>
        
        <div id="zina">
            ✅ AUTORIZĀCIJA IZDEVĀS!<br>
            <span style="font-size: 20px; display: block; margin-top: 20px;">Telefons veiksmīgi noskenēja QR kodu</span>
        </div>
        
        <div class="palidziba" id="testaDala">
            <strong>🔧 Testēšanai:</strong><br>
            <button onclick="window.location.href = window.location.pathname + '?apstiprinats=' + sesijasId">📱 Imitēt apstiprinājumu</button>
            <button onclick="window.location.reload()">🔄 Pārlādēt</button>
        </div>
    </div>

    <script>
        // Pārbaudām vai URL ir apstiprinājuma parametrs
        const urlParams = new URLSearchParams(window.location.search);
        const apstiprinats = urlParams.get('apstiprinats');
        
        if (apstiprinats) {
            // Ja ir apstiprinājums - paslēp QR un parādi ziņu
            document.getElementById('qrSekcija').style.display = 'none';
            document.getElementById('zina').style.display = 'block';
            document.getElementById('testaDala').style.display = 'none';
        } else {
            // Ja nav - ģenerē jaunu QR kodu
            const sesijasId = 'sesija_' + Math.random().toString(36).substring(2, 15);
            document.getElementById('sesijasId').innerHTML = '<strong>Sesijas ID:</strong> ' + sesijasId;
            
            // TE MILZĪGI SVARĪGI - šeit veidojam SAITI UZ TELEFONA LAPU
            const telefonaLapa = 'https://hitmakriga.github.io/hakatons/tel';
            const qrSaturs = telefonaLapa + '?sesija=' + sesijasId;
            
            // Ģenerējam QR kodu
            document.getElementById('qrKods').src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(qrSaturs);
        }
        
        // Šī funkcija pārbauda vai ir jauni parametri (katru sekundi)
        function parbauditParametrus() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('apstiprinats')) {
                document.getElementById('qrSekcija').style.display = 'none';
                document.getElementById('zina').style.display = 'block';
                document.getElementById('testaDala').style.display = 'none';
            }
        }
        
        // Pārbaudām ik pēc sekundes
        setInterval(parbauditParametrus, 1000);
    </script>
</body>
</html>
